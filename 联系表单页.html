<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 你的名字 | 设计师作品集</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 引入Inter字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1A1A1A',
                        secondary: '#F8F9FA',
                        accent: '#007AFF',
                        dark: {
                            primary: '#F8F9FA',
                            secondary: '#2D2D2D',
                            accent: '#5AC8FA'
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-in-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .text-balance {
                text-wrap: balance;
            }
            .nav-link {
                @apply px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-accent dark:hover:text-dark-accent transition-colors duration-300;
            }
            .form-input {
                @apply w-full px-4 py-3 rounded-lg bg-white dark:bg-dark-secondary border border-gray-300 dark:border-gray-700 focus:border-accent dark:focus:border-dark-accent focus:ring-2 focus:ring-accent/20 dark:focus:ring-dark-accent/20 outline-none transition-all duration-300 text-primary dark:text-dark-primary;
            }
        }
    </style>
</head>
<body class="bg-secondary dark:bg-primary font-inter text-gray-800 dark:text-gray-200 antialiased">
    <!-- 进度条 -->
    <div id="progressBar" class="fixed top-0 left-0 h-1 bg-accent dark:bg-dark-accent z-50 origin-left w-0 transition-all duration-300"></div>

    <!-- 暗黑模式切换 -->
    <button id="themeToggle" class="fixed top-6 right-6 z-50 w-10 h-10 rounded-full bg-white/80 dark:bg-dark-secondary/80 backdrop-blur-sm flex items-center justify-center text-primary dark:text-dark-primary hover:bg-accent/10 dark:hover:bg-dark-accent/20 transition-all duration-300">
        <i class="fas fa-moon dark:hidden text-xl"></i>
        <i class="fas fa-sun hidden dark:block text-xl"></i>
    </button>

    <!-- 导航栏 -->
    <nav class="fixed w-full bg-white/90 dark:bg-primary/90 backdrop-blur-md z-40 border-b border-gray-100 dark:border-gray-800 transition-all duration-500">
        <div class="container mx-auto px-6 md:px-12 py-5 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-primary dark:text-dark-primary tracking-tight">你的名字</a>
            
            <!-- 桌面端导航 -->
            <div class="hidden md:flex items-center space-x-1">
                <a href="index.html#hero" class="nav-link">首页</a>
                <a href="index.html#works" class="nav-link">作品</a>
                <a href="index.html#about" class="nav-link">关于</a>
                <a href="contact.html" class="nav-link text-accent dark:text-dark-accent">联系</a>
            </div>
            
            <!-- 移动端菜单按钮 -->
            <button id="menuBtn" class="md:hidden text-primary dark:text-dark-primary text-2xl">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <!-- 移动端导航菜单 -->
        <div id="mobileMenu" class="md:hidden hidden bg-white dark:bg-primary border-b border-gray-100 dark:border-gray-800 animate-fade-in">
            <div class="container mx-auto px-6 py-4 flex flex-col space-y-3">
                <a href="index.html#hero" class="nav-link py-3">首页</a>
                <a href="index.html#works" class="nav-link py-3">作品</a>
                <a href="index.html#about" class="nav-link py-3">关于</a>
                <a href="contact.html" class="nav-link py-3 text-accent dark:text-dark-accent">联系</a>
            </div>
        </div>
    </nav>

    <!-- 联系页面头部 -->
    <section class="pt-32 pb-16 px-6 md:px-12">
        <div class="container mx-auto max-w-5xl text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-6 text-primary dark:text-dark-primary">联系我</h1>
            <p class="text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto mb-16">
                欢迎探讨设计合作、项目咨询或设计交流，我会在1-2个工作日内回复你
            </p>
        </div>
    </section>

    <!-- 联系表单与信息 -->
    <section class="py-16 px-6 md:px-12 bg-white dark:bg-dark-secondary">
        <div class="container mx-auto max-w-6xl">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-12">
                <!-- 联系信息 -->
                <div class="lg:col-span-2">
                    <h2 class="text-3xl font-bold mb-8 text-primary dark:text-dark-primary">联系方式</h2>
                    
                    <div class="space-y-8">
                        <div class="flex items-start gap-4">
                            <div class="w-12 h-12 rounded-full bg-accent/10 dark:bg-dark-accent/20 flex items-center justify-center text-accent dark:text-dark-accent shrink-0 mt-1">
                                <i class="fas fa-envelope text-xl"></i>
                            </div>
                            <div>
                                <h4 class="text-xl font-semibold mb-2 text-primary dark:text-dark-primary">邮箱</h4>
                                <a href="mailto:your@email.com" class="text-gray-600 dark:text-gray-400 hover:text-accent dark:hover:text-dark-accent transition-colors duration-300">your@email.com</a>
                                <p class="text-gray-500 dark:text-gray-500 mt-2 text-sm">优先联系方式，建议详细描述需求</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-4">
                            <div class="w-12 h-12 rounded-full bg-accent/10 dark:bg-dark-accent/20 flex items-center justify-center text-accent dark:text-dark-accent shrink-0 mt-1">
                                <i class="fas fa-phone text-xl"></i>
                            </div>
                            <div>
                                <h4 class="text-xl font-semibold mb-2 text-primary dark:text-dark-primary">电话</h4>
                                <a href="tel:+8612345678901" class="text-gray-600 dark:text-gray-400 hover:text-accent dark:hover:text-dark-accent transition-colors duration-300">+86 123 4567 8901</a>
                                <p class="text-gray-500 dark:text-gray-500 mt-2 text-sm">工作时间：9:00 - 18:00（周一至周五）</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-4">
                            <div class="w-12 h-12 rounded-full bg-accent/10 dark:bg-dark-accent/20 flex items-center justify-center text-accent dark:text-dark-accent shrink-0 mt-1">
                                <i class="fas fa-map-marker-alt text-xl"></i>
                            </div>
                            <div>
                                <h4 class="text-xl font-semibold mb-2 text-primary dark:text-dark-primary">工作城市</h4>
                                <p class="text-gray-600 dark:text-gray-400">上海市 · 北京市（可远程协作）</p>
                                <p class="text-gray-500 dark:text-gray-500 mt-2 text-sm">支持线下沟通（需提前预约）</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 社交链接 -->
                    <div class="mt-12">
                        <h4 class="text-xl font-semibold mb-6 text-primary dark:text-dark-primary">社交平台</h4>
                        <div class="flex gap-4">
                            <a href="#" class="w-12 h-12 rounded-full bg-secondary dark:bg-primary flex items-center justify-center text-primary dark:text-dark-primary hover:bg-accent dark:hover:bg-dark-accent hover:text-white transition-all duration-300">
                                <i class="fab fa-behance text-xl"></i>
                            </a>
                            <a href="#" class="w-12 h-12 rounded-full bg-secondary dark:bg-primary flex items-center justify-center text-primary dark:text-dark-primary hover:bg-accent dark:hover:bg-dark-accent hover:text-white transition-all duration-300">
                                <i class="fab fa-dribbble text-xl"></i>
                            </a>
                            <a href="#" class="w-12 h-12 rounded-full bg-secondary dark:bg-primary flex items-center justify-center text-primary dark:text-dark-primary hover:bg-accent dark:hover:bg-dark-accent hover:text-white transition-all duration-300">
                                <i class="fab fa-instagram text-xl"></i>
                            </a>
                            <a href="#" class="w-12 h-12 rounded-full bg-secondary dark:bg-primary flex items-center justify-center text-primary dark:text-dark-primary hover:bg-accent dark:hover:bg-dark-accent hover:text-white transition-all duration-300">
                                <i class="fab fa-linkedin text-xl"></i>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 联系表单 -->
                <div class="lg:col-span-3">
                    <h2 class="text-3xl font-bold mb-8 text-primary dark:text-dark-primary">发送合作提案</h2>
                    
                    <form id="contactForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">姓名</label>
                                <input type="text" id="name" name="name" class="form-input" placeholder="请输入你的姓名" required>
                            </div>
                            <div>
                                <label for="phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">电话</label>
                                <input type="tel" id="phone" name="phone" class="form-input" placeholder="请输入你的联系电话" required>
                            </div>
                        </div>
                        
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">邮箱</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="请输入你的邮箱地址" required>
                        </div>
                        
                        <div>
                            <label for="service" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">需求类型</label>
                            <select id="service" name="service" class="form-input" required>
                                <option value="" disabled selected>请选择你需要的服务类型</option>
                                <option value="brand">品牌设计</option>
                                <option value="ui">UI/UX设计</option>
                                <option value="visual">视觉设计</option>
                                <option value="packaging">包装设计</option>
                                <option value="other">其他设计需求</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="message" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">项目描述</label>
                            <textarea id="message" name="message" rows="6" class="form-input" placeholder="请详细描述你的项目需求、预算、时间节点等信息..." required></textarea>
                        </div>
                        
                        <div class="flex items-center">
                            <input type="checkbox" id="privacy" name="privacy" class="w-4 h-4 text-accent dark:text-dark-accent border-gray-300 dark:border-gray-600 rounded focus:ring-accent dark:focus:ring-dark-accent" required>
                            <label for="privacy" class="ml-2 text-sm text-gray-600 dark:text-gray-400">
                                我同意我的信息被用于处理本次咨询，并遵守相关隐私政策
                            </label>
                        </div>
                        
                        <button type="submit" class="w-full bg-accent dark:bg-dark-accent text-white px-8 py-4 rounded-lg font-medium hover:bg-accent/90 dark:hover:bg-dark-accent/90 transition-all duration-300 shadow-lg hover:shadow-xl">
                            提交提案 <i class="fas fa-paper-plane ml-2"></i>
                        </button>
                    </form>
                    
                    <!-- 提交成功提示（默认隐藏） -->
                    <div id="successMessage" class="hidden mt-8 p-6 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg text-center">
                        <i class="fas fa-check-circle text-green-500 dark:text-green-400 text-3xl mb-4"></i>
                        <h3 class="text-xl font-bold text-green-800 dark:text-green-300 mb-2">提交成功！</h3>
                        <p class="text-green-700 dark:text-green-400">我会尽快查看你的提案并与你联系，感谢你的信任！</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-primary dark:bg-dark-secondary py-16 px-6 md:px-12">
        <div class="container mx-auto max-w-7xl">
            <div class="flex flex-col md:flex-row justify-between items-center border-b border-gray-800 dark:border-gray-700 pb-12 mb-12">
                <div class="mb-8 md:mb-0">
                    <h3 class="text-3xl font-bold text-white dark:text-dark-primary mb-4">你的名字</h3>
                    <p class="text-gray-500 dark:text-gray-400">创造有价值的设计</p>
                </div>
                
                <div class="flex gap-6">
                    <a href="#" class="text-gray-500 dark:text-gray-400 hover:text-white dark:hover:text-dark-primary transition-colors duration-300">
                        <i class="fab fa-behance text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 dark:text-gray-400 hover:text-white dark:hover:text-dark-primary transition-colors duration-300">
                        <i class="fab fa-dribbble text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 dark:text-gray-400 hover:text-white dark:hover:text-dark-primary transition-colors duration-300">
                        <i class="fab fa-instagram text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 dark:text-gray-400 hover:text-white dark:hover:text-dark-primary transition-colors duration-300">
                        <i class="fab fa-linkedin text-xl"></i>
                    </a>
                </div>
            </div>
            
            <div class="text-center text-gray-500 dark:text-gray-400">
                <p>© 2025 你的名字. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- 脚本 -->
    <script>
        // 暗黑模式切换
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }
        
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = menuBtn.querySelector('i');
            icon.classList.replace(icon.classList.contains('fa-bars') ? 'fa-bars' : 'fa-times', icon.classList.contains('fa-bars') ? 'fa-times' : 'fa-bars');
        });

        // 滚动进度条
        const progressBar = document.getElementById('progressBar');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.body.offsetHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            progressBar.style.width = scrollPercent + '%';
            
            // 导航栏滚动效果
            const nav = document.querySelector('nav');
            if (scrollTop > 50) {
                nav.classList.add('shadow-md');
                nav.classList.remove('py-5');
                nav.classList.add('py-3');
            } else {
                nav.classList.remove('shadow-md');
                nav.classList.add('py-5');
                nav.classList.remove('py-3');
            }
        });

        // 表单提交处理
        const contactForm = document.getElementById('contactForm');
        const successMessage = document.getElementById('successMessage');
        
        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 模拟表单提交
            // 实际项目中可替换为真实的API请求
            setTimeout(() => {
                contactForm.classList.add('hidden');
                successMessage.classList.remove('hidden');
                
                // 重置表单（可选）
                contactForm.reset();
            }, 1000);
        });
    </script>
</body>
</html>
